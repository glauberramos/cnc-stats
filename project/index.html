    <script>
      const SUPABASE_URL = "https://kxxcmxlfairnauvunmwj.supabase.co";
      const SUPABASE_KEY = "sb_publishable_lQU2ybO4fnJAKOrJBF8lrw_NnzJVev7";
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const params = new URLSearchParams(window.location.search);
      const PROJECT_SLUG = params.get("project");
      let PROJECT_YEAR = 2026; // will be set from Supabase

      // ─── Drawing ───

      // ─── Project list ───
      async function showProjectList() {
        const selector = document.getElementById("projectSelector");
        selector.style.display = "block";

        const { data, error } = await db
          .from("cnc_projects")
          .select("slug, title, icon_url, total_observations")
          .order("total_observations", { ascending: false });

        if (error || !data || data.length === 0) {
          const { data: logs } = await db
            .from("cnc_sync_log")
            .select("project_slug, total_fetched, status")
            .eq("status", "done")
            .order("total_fetched", { ascending: false });

          if (logs && logs.length > 0) {
            selector.innerHTML = `
              <h2>Select a synced project</h2>
              <div class="project-list">
                ${logs.map(l => `
                  <a class="project-link" href="?project=${l.project_slug}">
                    <div class="pl-info">
                      <div class="pl-title">${l.project_slug}</div>
                      <div class="pl-count">${(l.total_fetched || 0).toLocaleString()} observations synced</div>
                    </div>
                  </a>`).join("")}
              </div>`;
          } else {
            selector.innerHTML = `<h2>No projects found</h2><p>No project data available yet.</p>`;
          }
          return;
        }

        selector.innerHTML = `
          <h2>Select a CNC project</h2>
          <div class="project-list">
            ${data.map(p => `
              <a class="project-link" href="?project=${p.slug}">
                ${p.icon_url ? `<img src="${p.icon_url}" alt="" />` : ""}
                <div class="pl-info">
                  <div class="pl-title">${p.title || p.slug}</div>
                  <div class="pl-count">${(p.total_observations || 0).toLocaleString()} observations</div>
                </div>
              </a>`).join("")}
          </div>`;
      }

      // ─── Fetch project info from iNat API ───
      async function fetchProjectInfo(slug) {
        try {
          const response = await fetch(`https://api.inaturalist.org/v1/projects/${slug}`);
          if (!response.ok) return null;
          const data = await response.json();
          return data.results && data.results[0] ? data.results[0] : null;
        } catch (e) {
          console.warn("Could not fetch project info:", e.message);
          return null;
        }
      }

      function renderProjectHeader(project, slug) {
        const header = document.getElementById("projectHeader");
        document.getElementById("defaultHeader").style.display = "none";
        const skeleton = document.getElementById("headerSkeleton");
        if (skeleton) skeleton.style.display = "none";
        header.style.display = "block";

        const icon = project ? (project.icon || "../logo.png") : "../logo.png";
        const title = project ? project.title : slug;
        const projectUrl = `https://www.inaturalist.org/projects/${slug}`;

        let dateRange = "";
        if (project && project.search_parameters) {
          const d1 = project.search_parameters.find(p => p.field === "d1");
          const d2 = project.search_parameters.find(p => p.field === "d2");
          if (d1 && d2) {
            const fmt = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
            const year = d2.value.split("-")[0] || PROJECT_YEAR;
            dateRange = `<p style="color:#888;font-size:0.9rem;margin-top:4px">${fmt(d1.value)} \u2013 ${fmt(d2.value)}, ${year}</p>`;
          }
        }

        header.innerHTML = `
          <img src="../CNC_Logo_Grayscale.png" alt="City Nature Challenge" class="header-logo light" />
          <img src="../CNC_Logo_Knockout.png" alt="City Nature Challenge" class="header-logo dark" />
          <h1>${title}</h1>${dateRange}
          <p style="margin-top:2px;margin-bottom:16px"><a href="${projectUrl}" target="_blank">View on iNaturalist \u2192</a></p>
        `;

        document.title = `CNC: ${title}`;
      }

      // ─── Fetch live stats from iNat API ───
      // Note: total_observations and total_identifiers are obtained from
      // fetchLiveHighlightData to avoid duplicate API calls.
      async function fetchLiveStats(slug) {
        const api = "https://api.inaturalist.org/v1";
        const [speciesData, observersData, rgData] = await Promise.all([
          fetchWithRetry(`${api}/observations/species_counts?project_id=${slug}&per_page=0`).then(r => r.json()),
          fetchWithRetry(`${api}/observations/observers?project_id=${slug}&per_page=0`).then(r => r.json()),
          fetchWithRetry(`${api}/observations?project_id=${slug}&quality_grade=research&per_page=0`).then(r => r.json()),
        ]);
        return {
          total_species: speciesData.total_results || 0,
          total_observers: observersData.total_results || 0,
          research_grade: rgData.total_results || 0,
        };
      }

      async function fetchLiveHighlightData(slug) {
        const api = "https://api.inaturalist.org/v1";
        async function fetchAllPages(url) {
          const perPage = 500;
          const firstPage = await fetchWithRetry(`${url}&per_page=${perPage}&page=1`).then(r => r.json());
          const allResults = [...(firstPage.results || [])];
          const totalResults = firstPage.total_results || 0;
          const totalPages = Math.ceil(totalResults / perPage);
          if (totalPages > 1) {
            const remaining = await Promise.all(
              Array.from({ length: totalPages - 1 }, (_, i) =>
                fetchWithRetry(`${url}&per_page=${perPage}&page=${i + 2}`).then(r => r.json())
              )
            );
            remaining.forEach(page => allResults.push(...(page.results || [])));
          }
          return allResults;
        }

        const [speciesData, identifiersData, topFavedData, endemicData, threatenedData] = await Promise.all([
          fetchWithRetry(`${api}/observations/species_counts?project_id=${slug}&per_page=10&rank=species`).then(r => r.json()),
          fetchWithRetry(`${api}/observations/identifiers?project_id=${slug}&per_page=10`).then(r => r.json()),
          fetchWithRetry(`${api}/observations?project_id=${slug}&order_by=votes&per_page=10`).then(r => r.json()),
          fetchAllPages(`${api}/observations/species_counts?project_id=${slug}&endemic=true&quality_grade=research&rank=species`),
          fetchAllPages(`${api}/observations/species_counts?project_id=${slug}&threatened=true&quality_grade=research&rank=species`),
        ]);
        const statusOrder = { CR: 0, EN: 1, VU: 2, NT: 3, TH: 4 };
        const endangeredSpecies = (threatenedData || [])
          .map(r => {
            const cs = r.taxon.conservation_status;
            const status = cs ? cs.status.toUpperCase() : "TH";
            return {
              taxon_id: r.taxon.id,
              taxon_name: r.taxon.name,
              common_name: r.taxon.preferred_common_name || null,
              photo_url: r.taxon.default_photo ? r.taxon.default_photo.square_url.replace("square", "small") : null,
              status: status,
              project_obs_count: r.count,
            };
          })
          .sort((a, b) => (statusOrder[a.status] ?? 99) - (statusOrder[b.status] ?? 99) || (b.project_obs_count - a.project_obs_count));

        function mapObs(o) {
          const photo = o.photos && o.photos[0] ? o.photos[0].url.replace("square", "small") : null;
          return {
            inat_id: o.id,
            common_name: o.taxon ? o.taxon.preferred_common_name : null,
            taxon_name: o.taxon ? o.taxon.name : null,
            photo_url: photo,
            user_login: o.user ? o.user.login : null,
            faves_count: o.faves_count || 0,
          };
        }
        return {
          total_observations: topFavedData.total_results || 0,
          total_identifiers: identifiersData.total_results || 0,
          topSpecies: (speciesData.results || []).map(r => ({
            taxon_id: r.taxon.id, name: r.taxon.preferred_common_name || r.taxon.name,
            sci: r.taxon.name, photo: r.taxon.default_photo ? r.taxon.default_photo.square_url : null,
            count: r.count,
          })),
          topIdentifiers: (identifiersData.results || []).map(r => ({
            login: r.user?.login || "?", icon: r.user?.icon_url || r.user?.icon || "",
            count: r.count || 0,
          })),
          topFavorited: (topFavedData.results || []).map(mapObs),
          endangeredSpecies: endangeredSpecies,
          endemicSpecies: (endemicData || []).map(r => ({
            taxon_id: r.taxon.id,
            taxon_name: r.taxon.name,
            common_name: r.taxon.preferred_common_name || null,
            photo_url: r.taxon.default_photo ? r.taxon.default_photo.square_url.replace("square", "small") : null,
            obs_count: r.count,
          })),
        };
      }

      // ─── Load project data ───
      async function loadProject(slug) {
        document.getElementById("defaultHeader").style.display = "none";
        document.getElementById("content").style.display = "block";

        // Fetch everything in parallel: project info, computed stats, live stats, live highlights
        const projectInfoPromise = fetchProjectInfo(slug);
        const supabasePromise = db.from("cnc_projects").select("computed_stats, computed_at, year").eq("slug", slug).limit(1);
        const liveStatsPromise = fetchLiveStats(slug);
        const liveHighlightsPromise = fetchLiveHighlightData(slug);

        // Wait for Supabase to get year before rendering header
        const [projectInfo, { data: projectData }] = await Promise.all([projectInfoPromise, supabasePromise]);
        const stats = projectData && projectData.length > 0 ? projectData[0].computed_stats : null;
        const computedAt = projectData && projectData.length > 0 ? projectData[0].computed_at : null;
        if (projectData && projectData.length > 0 && projectData[0].year) {
          PROJECT_YEAR = projectData[0].year;
        }

        renderProjectHeader(projectInfo, slug);

        // Await both stats and highlights, then merge counts to avoid duplicate API calls
        let liveStats = null;
        let liveHighlights = { total_observations: 0, total_identifiers: 0, topSpecies: [], topIdentifiers: [], topFavorited: [], endangeredSpecies: [], endemicSpecies: [] };
        try {
          liveHighlights = await liveHighlightsPromise;
        } catch (e) {
          console.warn("Live highlights fetch failed:", e);
        }
        try {
          const partialStats = await liveStatsPromise;
          liveStats = {
            ...partialStats,
            total_observations: liveHighlights.total_observations,
            total_identifiers: liveHighlights.total_identifiers,
          };
          renderStats(liveStats);
        } catch (e) {
          console.warn("Live stats fetch failed:", e);
        }

        if (stats) {
          renderHighlights(stats, liveHighlights, computedAt);
        } else {
          document.getElementById("highlightsContainer").innerHTML = '<p style="text-align:center;color:#888;padding:20px">More details coming soon.</p>';
        }

        renderObservationMap(slug, liveStats || stats, projectInfo);
      }

      // ─── Render stats (from live iNat API data) ───
      function renderStats(s) {
        const baseUrl = `https://www.inaturalist.org/observations?project_id=${PROJECT_SLUG}&verifiable=any`;
        document.getElementById("statsBar").innerHTML = `
          <a class="stat-card" href="${baseUrl}" target="_blank" style="text-decoration:none;color:inherit"><div class="stat-value">${s.total_observations.toLocaleString()}</div><div class="stat-label">📷 Observations</div></a>
          <a class="stat-card" href="${baseUrl}&view=species" target="_blank" style="text-decoration:none;color:inherit"><div class="stat-value">${s.total_species.toLocaleString()}</div><div class="stat-label">🌿 Species</div></a>
          <div class="stat-card"><div class="stat-value">${s.total_species > 0 ? (s.total_observations / s.total_species).toFixed(1) : 0}</div><div class="stat-label">🧬 Obs/Species</div></div>
          <div class="stat-card"><div class="stat-value">${s.total_observers > 0 ? (s.total_observations / s.total_observers).toFixed(1) : 0}</div><div class="stat-label">📊 Obs/Person</div></div>
          <a class="stat-card" href="${baseUrl}&quality_grade=research" target="_blank" style="text-decoration:none;color:inherit"><div class="stat-value">${s.research_grade.toLocaleString()}</div><div class="stat-label">✅ Research Grade</div></a>
          <div class="stat-card"><div class="stat-value">${s.total_observations > 0 ? Math.round(s.research_grade / s.total_observations * 100) : 0}%</div><div class="stat-label">✅ Research Grade Rate</div></div>
          <a class="stat-card" href="${baseUrl}&view=observers" target="_blank" style="text-decoration:none;color:inherit"><div class="stat-value">${s.total_observers.toLocaleString()}</div><div class="stat-label">👥 Observers</div></a>
          <a class="stat-card" href="${baseUrl}&view=identifiers" target="_blank" style="text-decoration:none;color:inherit"><div class="stat-value">${s.total_identifiers.toLocaleString()}</div><div class="stat-label">🔍 Identifiers</div></a>
        `;
      }


      // ─── Observation Map ───
      async function fetchWithRetry(url, retries = 3) {
        for (let i = 0; i < retries; i++) {
          try {
            const res = await fetch(url);
            if (res.ok) return res;
            if (res.status === 429) { await new Promise(r => setTimeout(r, 2000 * (i + 1))); continue; }
          } catch (e) { if (i === retries - 1) throw e; }
          await new Promise(r => setTimeout(r, 1000 * (i + 1)));
        }
        throw new Error(`Failed to fetch ${url}`);
      }

      async function renderObservationMap(slug, stats, projectInfo) {
        const mapContainer = document.getElementById("observationMap");
        const mapSubtitle = document.getElementById("mapSubtitle");
        if (!mapContainer || !mapSubtitle) return;

        try {
          // 1. Get project bounding box from project info (already fetched)
          const proj = projectInfo;

          let bounds = null;
          let placeIds = [];
          const allGeometries = [];
          if (proj) {
            // Collect all place IDs
            const placeParam = (proj.search_parameters || []).find(p => p.field === "place_id");
            if (placeParam) {
              placeIds = Array.isArray(placeParam.value) ? placeParam.value : [placeParam.value];
            } else if (proj.place_id) {
              placeIds = [proj.place_id];
            }

            if (placeIds.length > 0) {
              // Fetch all places in a single batched call
              const placeData = await fetchWithRetry(`https://api.inaturalist.org/v1/places/${placeIds.join(",")}`)
                .then(r => r.json())
                .catch(() => ({ results: [] }));
              const placeResults = placeData.results || [];

              let allLats = [], allLngs = [];
              for (const place of placeResults) {
                if (!place || !place.bounding_box_geojson) continue;
                const coords = place.bounding_box_geojson.coordinates[0];
                allLngs.push(...coords.map(c => c[0]));
                allLats.push(...coords.map(c => c[1]));
                const geom = place.geometry_geojson || place.bounding_box_geojson;
                if (geom) allGeometries.push(geom);
              }

              if (allLats.length > 0) {
                bounds = {
                  swLat: Math.min(...allLats), swLng: Math.min(...allLngs),
                  neLat: Math.max(...allLats), neLng: Math.max(...allLngs),
                };
              }
            }
          }

          if (!bounds) {
            mapSubtitle.innerHTML = `<div class="map-stat-card" style="grid-column:1/-1"><div class="map-stat-label">Map unavailable — no place data</div></div>`;
            mapContainer.innerHTML = "";
            return;
          }

          // 2. Calculate appropriate zoom level and tiles
          function lat2tile(lat, z) { return Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * (1 << z)); }
          function lng2tile(lng, z) { return Math.floor((lng + 180) / 360 * (1 << z)); }
          function tile2lat(y, z) { const n = Math.PI - 2 * Math.PI * y / (1 << z); return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n))); }
          function tile2lng(x, z) { return x / (1 << z) * 360 - 180; }

          // Find zoom where area fits in ~4x4 tiles max
          let zoom = 1;
          for (let z = 14; z >= 1; z--) {
            const tx1 = lng2tile(bounds.swLng, z);
            const tx2 = lng2tile(bounds.neLng, z);
            const ty1 = lat2tile(bounds.neLat, z);
            const ty2 = lat2tile(bounds.swLat, z);
            if (tx2 - tx1 <= 3 && ty2 - ty1 <= 3) {
              zoom = z;
              break;
            }
          }

          const tileX1 = lng2tile(bounds.swLng, zoom);
          const tileX2 = lng2tile(bounds.neLng, zoom);
          const tileY1 = lat2tile(bounds.neLat, zoom);
          const tileY2 = lat2tile(bounds.swLat, zoom);

          const tilesX = tileX2 - tileX1 + 1;
          const tilesY = tileY2 - tileY1 + 1;
          const GRID_PER_TILE = 32;
          const totalCols = tilesX * GRID_PER_TILE;
          const totalRows = tilesY * GRID_PER_TILE;

          mapContainer.style.gridTemplateColumns = `repeat(${totalCols}, 1fr)`;
          mapContainer.style.aspectRatio = `${totalCols} / ${totalRows}`;

          // 3. Fetch OSM tiles and UTFGrid data in parallel
          const osmTilePromises = [];
          const gridPromises = [];

          for (let ty = tileY1; ty <= tileY2; ty++) {
            for (let tx = tileX1; tx <= tileX2; tx++) {
              osmTilePromises.push({ tx, ty, url: `https://tile.openstreetmap.org/${zoom}/${tx}/${ty}.png` });
              gridPromises.push(
                fetchWithRetry(`https://api.inaturalist.org/v1/grid/${zoom}/${tx}/${ty}.grid.json?project_id=${slug}`)
                  .then(r => r.json())
                  .then(d => ({ tx, ty, data: d }))
                  .catch(() => ({ tx, ty, data: null }))
              );
            }
          }

          const gridResults = await Promise.all(gridPromises);

          // 4. Parse UTFGrid to find cells with observations
          const observedCells = new Set();
          let totalLandCells = 0;

          // 5. Point-in-polygon helpers
          function pointInPolygon(lat, lng, ring) {
            let inside = false;
            for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
              const xi = ring[i][0], yi = ring[i][1];
              const xj = ring[j][0], yj = ring[j][1];
              if ((yi > lat) !== (yj > lat) && lng < (xj - xi) * (lat - yi) / (yj - yi) + xi) {
                inside = !inside;
              }
            }
            return inside;
          }

          function pointInAnyGeometry(lat, lng) {
            if (allGeometries.length === 0) {
              return lat >= bounds.swLat && lat <= bounds.neLat && lng >= bounds.swLng && lng <= bounds.neLng;
            }
            for (const geom of allGeometries) {
              const polys = geom.type === "MultiPolygon" ? geom.coordinates : [geom.coordinates];
              for (const poly of polys) {
                if (pointInPolygon(lat, lng, poly[0])) return true;
              }
            }
            return false;
          }

          // Parse UTFGrid and only count cells inside project boundary
          for (const { tx, ty, data } of gridResults) {
            if (!data || !data.grid || !data.keys || !data.data) continue;

            const utfGridSize = data.grid.length;
            const groupSize = utfGridSize / GRID_PER_TILE;

            for (let row = 0; row < utfGridSize; row++) {
              const gridRow = data.grid[row];
              if (!gridRow) continue;
              for (let col = 0; col < gridRow.length; col++) {
                let id = gridRow.charCodeAt(col);
                if (id >= 93) id--;
                if (id >= 35) id--;
                id -= 32;

                if (id > 0) {
                  const displayRow = (ty - tileY1) * GRID_PER_TILE + Math.floor(row / groupSize);
                  const displayCol = (tx - tileX1) * GRID_PER_TILE + Math.floor(col / groupSize);
                  const cellLng = tile2lng(tileX1 + (displayCol + 0.5) / GRID_PER_TILE, zoom);
                  const cellLat = tile2lat(tileY1 + (displayRow + 0.5) / GRID_PER_TILE, zoom);
                  if (pointInAnyGeometry(cellLat, cellLng)) {
                    observedCells.add(`${displayRow},${displayCol}`);
                  }
                }
              }
            }
          }

          // Count total cells inside project boundary
          for (let r = 0; r < totalRows; r++) {
            for (let c = 0; c < totalCols; c++) {
              const cellLng = tile2lng(tileX1 + (c + 0.5) / GRID_PER_TILE, zoom);
              const cellLat = tile2lat(tileY1 + (r + 0.5) / GRID_PER_TILE, zoom);
              if (pointInAnyGeometry(cellLat, cellLng)) {
                totalLandCells++;
              }
            }
          }

          const coveragePct = totalLandCells > 0 ? Math.min(100, Math.round(observedCells.size / totalLandCells * 100)) : 0;

          // 6. Render map
          let html = "";
          // Add OSM tiles as background
          for (const tile of osmTilePromises) {
            const left = ((tile.tx - tileX1) / tilesX * 100) + "%";
            const top = ((tile.ty - tileY1) / tilesY * 100) + "%";
            const w = (100 / tilesX) + "%";
            const h = (100 / tilesY) + "%";
            html += `<img src="${tile.url}" alt="" style="position:absolute;left:${left};top:${top};width:${w};height:${h};object-fit:fill;" />`;
          }

          // Add grid cells
          for (let r = 0; r < totalRows; r++) {
            for (let c = 0; c < totalCols; c++) {
              const hasObs = observedCells.has(`${r},${c}`);
              html += `<div style="aspect-ratio:1;position:relative;z-index:2;background:${hasObs ? "rgba(116,172,0,0.7)" : "transparent"}"></div>`;
            }
          }

          // Add project boundary SVG overlay for all geometries
          if (allGeometries.length > 0) {
            const mapLngMin = tile2lng(tileX1, zoom);
            const mapLngMax = tile2lng(tileX1 + tilesX, zoom);
            const mapLatMax = tile2lat(tileY1, zoom);
            const mapLatMin = tile2lat(tileY1 + tilesY, zoom);

            function lngToX(lng) { return (lng - mapLngMin) / (mapLngMax - mapLngMin) * 100; }
            function latToY(lat) { return (1 - (lat - mapLatMin) / (mapLatMax - mapLatMin)) * 100; }

            let paths = "";
            for (const geom of allGeometries) {
              const rings = geom.type === "MultiPolygon"
                ? geom.coordinates.flatMap(poly => poly)
                : geom.coordinates;

              rings.forEach(ring => {
                const points = ring.map(c => `${lngToX(c[0])},${latToY(c[1])}`).join(" ");
                paths += `<polygon points="${points}" fill="rgba(255,140,0,0.15)" stroke="#ff8c00" stroke-width="0.5" stroke-opacity="0.85" />`;
              });
            }

            html += `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none">${paths}</svg>`;
          }

          mapContainer.innerHTML = html;

          let areaCard = "";
          const projectSpecies = stats?.total_species || stats?.summary?.total_species || 0;
          if (placeIds.length > 0 && projectSpecies > 0) {
            try {
              const verifiableParam = PROJECT_YEAR >= 2026 ? "&verifiable=true" : "";
              const scRes = await fetchWithRetry(`https://api.inaturalist.org/v1/observations/species_counts?place_id=${placeIds.join(",")}${verifiableParam}&per_page=0`);
              const scData = await scRes.json();
              const areaSpecies = scData.total_results || 0;
              if (areaSpecies > 0) {
                const speciesPct = Math.round(projectSpecies / areaSpecies * 100);
                areaCard = `<div class="map-stat-card"><div class="map-stat-value">${speciesPct}%</div><div class="map-stat-label">${projectSpecies.toLocaleString()} of ${areaSpecies.toLocaleString()} species covered</div></div>`;
              }
            } catch (e) { /* ignore */ }
          }
          const midLat = (bounds.swLat + bounds.neLat) / 2;
          const cellWidthM = 40075016.686 * Math.cos(midLat * Math.PI / 180) / (1 << zoom) / GRID_PER_TILE;
          const cellAreaKm2 = (cellWidthM * cellWidthM) / 1e6;
          const cellLabel = cellAreaKm2 >= 1 ? cellAreaKm2.toFixed(1) + " km\u00B2" : cellAreaKm2.toFixed(2) + " km\u00B2";
          mapSubtitle.innerHTML = `<div class="map-stat-card"><div class="map-stat-value">${coveragePct}%</div><div class="map-stat-label">${observedCells.size.toLocaleString()} of ${totalLandCells.toLocaleString()} grid squares covered \u00B7 ~${cellLabel}/square</div></div>${areaCard}`;

        } catch (err) {
          console.error("Map error:", err);
          if (mapSubtitle) mapSubtitle.innerHTML = `<div class="map-stat-card" style="grid-column:1/-1"><div class="map-stat-label">Unable to load map</div></div>`;
          if (mapContainer) mapContainer.innerHTML = "";
        }
      }

      // ─── Highlights ───
      function renderHighlights(stats, liveData, computedAt) {
        // === Render helpers ===
        function speciesItemHtml(s, badge) {
          const name = s.common_name || s.taxon_name || "Unknown";
          const sci = s.taxon_name || "";
          const photo = s.photo_url || "";
          const taxonUrl = s.taxon_id ? `https://www.inaturalist.org/observations?project_id=${PROJECT_SLUG}&taxon_id=${s.taxon_id}&verifiable=any` : "#";
          return `
            <a class="species-list-item" href="${taxonUrl}" target="_blank">
              ${photo ? `<img src="${photo}" alt="" />` : `<span style="width:40px;height:40px;border-radius:8px;background:#e8e8e8;display:inline-block;flex-shrink:0"></span>`}
              <div class="sli-info">
                <div class="sli-name">${name}</div>
                ${sci && sci !== name ? `<div class="sli-sci">${sci}</div>` : ""}
              </div>
              ${badge ? `<span class="sli-badge">${badge}</span>` : ""}
            </a>`;
        }

        // === Build HTML ===
        let html = "";
        const lastUpdated = computedAt
          ? `<span class="last-updated" style="font-size:0.7rem;font-weight:400;color:#999;margin-left:8px">Updated ${new Date(computedAt).toLocaleDateString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" })}</span>`
          : "";

        // Data (live from iNat API)
        const topSpecies = liveData.topSpecies || [];
        const topIdentifiers = liveData.topIdentifiers || [];
        const firstObservations = stats.first_observations || [];
        const endangered = { total: (liveData.endangeredSpecies || []).length, species: liveData.endangeredSpecies || [] };

        const iucnColors = { CR: "#d32f2f", EN: "#e65100", VU: "#f9a825", NT: "#1976d2", TH: "#7B1FA2" };
        const topFavorited = liveData.topFavorited || [];
        const topCommented = stats.most_commented || [];

        function obsItemHtml(o, badge) {
          const name = o.common_name || o.taxon_name || "Unknown";
          const photo = o.photo_url || "";
          const url = `https://www.inaturalist.org/observations/${o.inat_id}`;
          return `
            <a class="species-list-item" href="${url}" target="_blank">
              ${photo ? `<img src="${photo}" alt="" />` : `<span style="width:40px;height:40px;border-radius:8px;background:#e8e8e8;display:inline-block;flex-shrink:0"></span>`}
              <div class="sli-info">
                <div class="sli-name">${name}</div>
                <div class="sli-meta">by ${o.user_login || "?"}</div>
              </div>
              <span class="sli-badge">${badge}</span>
            </a>`;
        }

        const endemicSpecies = liveData.endemicSpecies || [];

        // Row 1: Observations Coverage Map + First Observations
        html += `<div class="highlights-grid">`;
        html += `<div class="highlight-card">
          <h3>\u{1F5FA}\uFE0F Observations Coverage</h3>
          <div class="map-stats" id="mapSubtitle"></div>
          <div class="map-container" id="observationMap" style="grid-template-columns: repeat(32, 1fr)"></div>
        </div>`;
        html += `<div class="highlight-card">
          <h3>\u{2B50} First Observations <span class="highlight-count">${firstObservations.filter(s => s.research_grade).length} species</span>${lastUpdated}</h3>
          ${firstObservations.length > 0
            ? (() => {
                const rgObs = firstObservations.filter(s => s.research_grade);
                const needsIdObs = firstObservations.filter(s => !s.research_grade);
                function firstObsItemHtml(s) {
                  const name = s.common_name || s.taxon_name || "Unknown";
                  const sci = s.taxon_name || "";
                  const photo = s.photo_url || "";
                  const taxonUrl = s.taxon_id ? "https://www.inaturalist.org/observations?project_id=" + PROJECT_SLUG + "&taxon_id=" + s.taxon_id + "&verifiable=any" : "#";
                  return '<a class="species-list-item" href="' + taxonUrl + '" target="_blank">'
                    + (photo ? '<img src="' + photo + '" alt="" />' : '<span style="width:40px;height:40px;border-radius:8px;background:#e8e8e8;display:inline-block;flex-shrink:0"></span>')
                    + '<div class="sli-info">'
                    + '<div class="sli-name">' + name + '</div>'
                    + (sci && sci !== name ? '<div class="sli-sci">' + sci + '</div>' : '')
                    + '</div>'
                    + '<div class="sli-tags" style="display:flex;align-items:center;gap:6px;flex-shrink:0">'
                    + (s.first_global_obs ? '<span style="background:linear-gradient(135deg,#FFD700,#FFA000);color:#333;font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;box-shadow:0 1px 3px rgba(255,160,0,0.3)">\u2B50 1st global</span>' : '')
                    + (s.first_local_obs ? '<span style="background:linear-gradient(135deg,#4CAF50,#2E7D32);color:#fff;font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;box-shadow:0 1px 3px rgba(46,125,50,0.3)">\u{1F4CD} 1st local</span>' : '')
                    + '<span class="sli-badge">' + (s.global_obs_count || 0) + ' global' + (s.local_obs_count != null ? ' \u00B7 ' + s.local_obs_count + ' local' : '') + '</span>'
                    + '</div></a>';
                }
                let listHtml = '<div class="scrollable-list">';
                if (rgObs.length > 0) {
                  listHtml += '<div class="group-header group-header-rg" role="button" tabindex="0" aria-expanded="true" aria-label="Research Grade observations" onclick="const c=this.nextElementSibling;const a=this.querySelector(\'.collapse-arrow\');if(c.style.display===\'none\'){c.style.display=\'\';a.textContent=\'\\u25B2\';this.setAttribute(\'aria-expanded\',\'true\')}else{c.style.display=\'none\';a.textContent=\'\\u25BC\';this.setAttribute(\'aria-expanded\',\'false\')}" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();this.click()}">\u2705 Research Grade (' + rgObs.length + ')<span class="collapse-arrow" aria-hidden="true">\u25B2</span></div>';
                  listHtml += '<div>' + rgObs.map(firstObsItemHtml).join("") + '</div>';
                }
                if (needsIdObs.length > 0) {
                  listHtml += '<div class="group-header group-header-needs-id' + (rgObs.length > 0 ? ' group-header-mt' : '') + '" role="button" tabindex="0" aria-expanded="true" aria-label="Needs ID observations" onclick="const c=this.nextElementSibling;const a=this.querySelector(\'.collapse-arrow\');if(c.style.display===\'none\'){c.style.display=\'\';a.textContent=\'\\u25B2\';this.setAttribute(\'aria-expanded\',\'true\')}else{c.style.display=\'none\';a.textContent=\'\\u25BC\';this.setAttribute(\'aria-expanded\',\'false\')}" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();this.click()}">\u{1F50D} Needs ID (' + needsIdObs.length + ')<span class="collapse-arrow" aria-hidden="true">\u25B2</span></div>';
                  listHtml += '<div>' + needsIdObs.map(firstObsItemHtml).join("") + '</div>';
                }
                listHtml += '</div>';
                return listHtml;
              })()
            : `<div class="highlight-empty">No first observations found</div>`}
        </div>`;
        html += `</div>`;

        function endangeredItemHtml(s) {
          const name = s.common_name || s.taxon_name || "Unknown";
          const sci = s.taxon_name || "";
          const photo = s.photo_url || "";
          const color = iucnColors[s.status] || "#666";
          const taxonUrl = s.taxon_id ? "https://www.inaturalist.org/observations?project_id=" + PROJECT_SLUG + "&taxon_id=" + s.taxon_id + "&verifiable=any" : "#";
          return '<a class="species-list-item" href="' + taxonUrl + '" target="_blank">'
            + (photo ? '<img src="' + photo + '" alt="" />' : '<span style="width:40px;height:40px;border-radius:8px;background:#e8e8e8;display:inline-block;flex-shrink:0"></span>')
            + '<div class="sli-info">'
            + '<div class="sli-name">' + name + '</div>'
            + (sci && sci !== name ? '<div class="sli-sci">' + sci + '</div>' : '')
            + '</div>'
            + '<div class="sli-tags" style="display:flex;align-items:center;gap:6px;flex-shrink:0">'
            + '<span style="background:' + color + ';color:#fff;font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap">' + s.status + '</span>'
            + '<span class="sli-badge">' + s.project_obs_count + ' obs</span>'
            + '</div></a>';
        }

        // Row 2: Endangered Species + Endemic Species
        html += `<div class="highlights-grid">`;
        html += `<div class="highlight-card">
          <h3>\u{1F30D} Threatened Species <span class="highlight-count">${endangered.total} species</span></h3>
          ${endangered.species && endangered.species.length > 0
            ? `<div class="scrollable-list">${endangered.species.map(s => endangeredItemHtml(s)).join("")}</div>`
            : `<div class="highlight-empty">No endangered species found</div>`}
        </div>`;
        html += `<div class="highlight-card">
          <h3>\u{1F3DD}\uFE0F Endemic Species <span class="highlight-count">${endemicSpecies.length} species</span></h3>
          ${endemicSpecies.length > 0
            ? `<div class="scrollable-list">${endemicSpecies.map(s => speciesItemHtml(s, s.obs_count ? s.obs_count + ' obs' : '')).join("")}</div>`
            : `<div class="highlight-empty">No endemic species data available</div>`}
        </div>`;
        html += `</div>`;

        // Row 3: Most Observed Species + Top Identifiers
        html += `<div class="highlights-grid">`;
        html += `<div class="highlight-card">
          <h3>\u{1F3C5} Most Observed Species <span class="highlight-count">Top 10</span></h3>
          ${topSpecies.length > 0
            ? topSpecies.map((s, i) => {
                const taxonUrl = s.taxon_id ? `https://www.inaturalist.org/observations?project_id=${PROJECT_SLUG}&taxon_id=${s.taxon_id}&verifiable=any` : "#";
                return `<a class="species-list-item" href="${taxonUrl}" target="_blank">
                  ${s.photo ? `<img src="${s.photo}" alt="" />` : `<span style="width:40px;height:40px;border-radius:8px;background:#e8e8e8;display:inline-block;flex-shrink:0"></span>`}
                  <div class="sli-info">
                    <div class="sli-name">${s.name}${s.sci && s.sci !== s.name ? ` <span style="font-style:italic;font-weight:400;color:#888">${s.sci}</span>` : ""}</div>
                  </div>
                  <span class="sli-badge">${s.count} obs</span>
                </a>`;
              }).join("")
            : `<div class="highlight-empty">No data available</div>`}
        </div>`;
        html += `<div class="highlight-card">
          <h3>\u{1F50D} Top Identifiers <span class="highlight-count">Top 10</span></h3>
          ${topIdentifiers.length > 0
            ? topIdentifiers.map((item, i) => {
                const url = `https://www.inaturalist.org/identifications?project_id=${PROJECT_SLUG}&user_id=${item.login}`;
                return `<a class="species-list-item" href="${url}" target="_blank">
                  ${item.icon ? `<img src="${item.icon}" alt="" style="border-radius:50%" />` : `<span style="width:40px;height:40px;border-radius:50%;background:#e8e8e8;display:inline-block;flex-shrink:0"></span>`}
                  <div class="sli-info">
                    <div class="sli-name">${item.login}</div>
                  </div>
                  <span class="sli-badge">${item.count} IDs</span>
                </a>`;
              }).join("")
            : `<div class="highlight-empty">No data available</div>`}
        </div>`;
        html += `</div>`;

        // Row 4: Most Favorited + Most Commented
        html += `<div class="highlights-grid">`;
        html += `<div class="highlight-card">
          <h3>\u2764\uFE0F Most Favorited <span class="highlight-count">Top 10</span></h3>
          ${topFavorited.length > 0
            ? topFavorited.map(o => obsItemHtml(o, `\u2764\uFE0F ${o.faves_count || 0}`)).join("")
            : `<div class="highlight-empty">No favorited observations</div>`}
        </div>`;
        html += `<div class="highlight-card">
          <h3>\u{1F4AC} Most Commented <span class="highlight-count">Top 10</span>${lastUpdated}</h3>
          ${topCommented.length > 0
            ? topCommented.map(o => obsItemHtml(o, `\u{1F4AC} ${o.comments_count || 0}`)).join("")
            : `<div class="highlight-empty">No commented observations</div>`}
        </div>`;
        html += `</div>`;

        document.getElementById("highlightsContainer").innerHTML = html;
      }

      // ─── Init ───
      if (PROJECT_SLUG) {
        loadProject(PROJECT_SLUG);
      } else {
        showProjectList();
      }
    </script>
    <footer class="site-footer">
      <a href="https://citynaturechallenge.org" target="_blank"><img src="../260225_CNC_2026-participant-badge_color.png" alt="City Nature Challenge 2026 Participant" class="cnc-badge"></a>
      <div class="organized-by"><a href="https://citynaturechallenge.org" target="_blank">City Nature Challenge</a> is organized by</div>
      <nav class="org-logos" aria-label="Organizer links">
        <a href="https://www.nhm.org" target="_blank"><img src="../nhm-logo.svg" alt="Natural History Museum of Los Angeles County" class="nhm"></a>
        <a href="https://www.calacademy.org" target="_blank"><img src="../cal-academy.svg" alt="California Academy of Sciences" class="cas"></a>
      </nav>
      <p>Website created by <a href="https://glauberramos.github.io/inat/" target="_blank">Glauber Ramos</a></p>
    </footer>
  </body>
</html>
